<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — AmicaBull</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="../index.html" class="auth-logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <circle cx="14" cy="20" r="10" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <circle cx="26" cy="20" r="10" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M20 13.5C21.5 15.5 22 17.5 22 20C22 22.5 21.5 24.5 20 26.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>AmicaBull</span>
      </a>

      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-subtitle">Start resolving co-parenting conflicts with AI-powered mediation.</p>

        <form id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">First Name</label>
              <input class="form-input" type="text" id="firstName" placeholder="First name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Last Name</label>
              <input class="form-input" type="text" id="lastName" placeholder="Last name" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
          </div>

          <div class="form-group">
            <label class="form-label" for="role">I am a...</label>
            <select class="form-select" id="role" required>
              <option value="">Select your role</option>
              <option value="parent">Co-Parent</option>
              <option value="attorney">Attorney / Mediator</option>
              <option value="therapist">Family Therapist</option>
            </select>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand all communications are logged and cannot be deleted.</label>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <div class="form-divider">or</div>

        <button class="btn btn-outline btn-block" onclick="showToast('Google sign-up coming soon', 'info')">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>

      <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    function handleSignup(e) {
      e.preventDefault();
      if (validateForm(e.target)) {
        // Demo: redirect to dashboard
        showToast('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        showToast('Please fill in all required fields', 'error');
      }
    }
  </script>
</body>
</html>
